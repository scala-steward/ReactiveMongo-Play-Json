version: 2.1

commands:
  setup_sbt:
    description: Get and install SBT
    parameters:
      sbt_version:
        type: string
        default: "1.11.4"
    steps:
      - restore_cache:
          keys:
          - &sbt_cache_key sbt-{{ checksum "project/build.properties" }}

      - run:
          name: Setup SBT
          command: |
                    if [ ! -x ~/sbt/bin/sbt ]; then
                      cd ~/
                      curl --silent -L -o sbt.tgz curl --silent -L -o sbt.tgz https://github.com/sbt/sbt/releases/download/v<< parameters.sbt_version >>/sbt-<< parameters.sbt_version >>.tgz
                      tar -xzvf sbt.tgz && rm -f sbt.tgz
                    fi

      - save_cache:
          paths:
            - ~/sbt
          key: *sbt_cache_key

  build_n_tests:
    description: Build & Run tests
    steps:
      - restore_cache:
          keys:
          - &scala_cache_key scala-{{ .Environment.CIRCLE_JOB }}-{{ .Environment.REACTIVEMONGO_SHADED }}-{{ checksum "version.sbt" }}-{{ checksum "build.sbt" }}-{{ checksum "project/Common.scala" }}

      - run:
          name: Build & Run tests
          command: |
                    export PATH=$PATH:~/sbt/bin
                    export USER=`basename $HOME`
                    
                    ./.ci_scripts/validate.sh

      - save_cache:
          paths:
            - ~/.ivy2
            - ~/.cache/coursier
            - ~/.sbt
          key: *scala_cache_key

  collect_test_reports:
    description: Collect test reports
    steps:
      - run:
          name: Collect test report
          command: |
                    mkdir test-reports
                    find . -path '*/test-reports/*' -name '*.xml' \
                      -print -exec cp {} test-reports \;
          when: always

  publish_snapshots:
    description: Publish artifacts to Snapshots repository
    parameters:
      release_suffix:
        type: string
        default: ""
      play_version:
        type: string
        default: ""
      scala_versions:
        type: string
        default: ""
    steps:
      - deploy:
          name: Publish artifacts to Sonatype Snapshots
          command: |
                    if [ ! "${CIRCLE_BRANCH}" = "master" ]; then
                      echo "Skipped on branch ${CIRCLE_BRANCH}"
                      exit 0
                    fi

                    V=`sbt -J-Dsbt.log.noformat=true 'show version' 2>&1 | tail -n 1 | cut -d ']' -f 2 | sed -e 's/[ \t]*//g'`

                    if [ `echo "$V" | grep -cE 'SNAPSHOT$'` -eq 0 ]; then
                      S=`echo "$V" | perl -pe 's/([0-9]+)$/${\($1 + 1)}-SNAPSHOT/'`
                      echo "Cannot bump $V to $S"
                      echo "version in ThisBuild := \"$S\"" > version.sbt
                    fi

                    export PUBLISH_REPO_NAME="Sonatype Nexus Repository Manager"
                    export PUBLISH_REPO_ID="central.sonatype.com"
                    export PUBLISH_REPO_URL="https://central.sonatype.com/repository/maven-snapshots/"
                    
                    if [ "x$PUBLISH_USER" = "x" -o "x$PUBLISH_PASS" = "x" ]; then
                      echo "Missing publication credentials"
                      exit 1
                    fi
                    
                    export RELEASE_SUFFIX="<< parameters.release_suffix >>"
                    export PLAY_VERSION="<< parameters.play_version >>"
                    
                    echo "Publishing artifacts $RELEASE_SUFFIX for $PLAY_VERSION"
                    
                    if [ "x<< parameters.scala_versions >>" = "x" ]; then
                      sbt +publish
                    else
                      for V in `echo "<< parameters.scala_versions >>"`; do
                        sbt ++$V publish
                      done
                    fi

jobs:
  unit_test_suite:
    description: Unit test suite

    parameters:
      openjdk_version:
        type: string
        default: "11.0"
      release_suffix:
        type: string
        default: "play28"
      scala_version:
        type: string
        default: "2.13.16"
      play_version:
        type: string
        default: "2.8.1"
      shaded:
        type: boolean
        default: true

    docker:
      - image: cimg/openjdk:<< parameters.openjdk_version >>

    working_directory: ~/repo

    environment:
      REACTIVEMONGO_SHADED: << parameters.shaded >>
      RELEASE_SUFFIX: << parameters.release_suffix >>
      PLAY_VERSION: << parameters.play_version >>
      SCALA_VERSION: << parameters.scala_version >>
    
    steps:
      - checkout
      - setup_sbt
      - build_n_tests
      - collect_test_reports
      - store_test_results:
          path: test-reports

  publish_snapshots:
    docker:
      - image: cimg/openjdk:8.0

    working_directory: ~/repo

    steps:
      - checkout
      - setup_sbt

      - restore_cache:
          keys:
          - *scala_cache_key

      - run:
          name: Update PATH
          command: 'export PATH="$HOME/sbt/bin:$PATH"'

      - publish_snapshots:
          release_suffix: play26
          play_version: 2.6.14
          scala_versions: 2.11.12 2.12.20

      - publish_snapshots:
          release_suffix: play27
          play_version: 2.7.4
          scala_versions: 2.11.12 2.12.20 2.13.17

      - publish_snapshots:
          release_suffix: play28
          play_version: 2.8.1
          scala_versions: 2.12.20 2.13.17

      - publish_snapshots:
          release_suffix: play29
          play_version: 2.9.1
          scala_versions: 2.12.20 2.13.17

      - publish_snapshots:
          release_suffix: play210
          play_version: 2.10.6
          scala_versions: 2.12.20 2.13.17 3.8

      - publish_snapshots:
          release_suffix: play30
          play_version: 3.0.6
          scala_versions: 2.12.20 2.13.17 3.8

      - save_cache:
          paths:
            - ~/.ivy2
            - ~/.coursier/cache
            - ~/.sbt
          key: *scala_cache_key

  trigger_dependent_builds:
    docker:
      - image: cimg/base:2020.01

    working_directory: ~/repo

    steps:
      - run:
          name: Trigger build @ Play-ReactiveMongo
          command: |
                    curl -X POST "https://circleci.com/api/v1.1/project/github/ReactiveMongo/Play-ReactiveMongo/build?circle-token=${PLAY_REACTIVEMONGO_API_TOKEN}"

workflows:
  main_suite:
    max_auto_reruns: 3
    jobs:
      - unit_test_suite:
          name: unit_play26
          release_suffix: play26
          shaded: false
          openjdk_version: "8.0"
          scala_version: 2.12.20
          play_version: 2.6.14

      - unit_test_suite:
          name: unit_play27
          release_suffix: play27
          play_version: 2.7.4
          scala_version: 2.13.17

      - unit_test_suite:
          name: unit_play28
          release_suffix: play28
          shaded: false
          play_version: 2.8.1
          scala_version: 2.13.17

      - unit_test_suite:
          name: unit_play29
          release_suffix: play30
          play_version: 3.0.6
          scala_version: 2.13.17

      - unit_test_suite:
          name: unit_play210
          openjdk_version: "17.0"
          release_suffix: play210
          play_version: 2.10.6
          scala_version: '3.8'

      - unit_test_suite:
          name: unit_play3
          openjdk_version: "17.0"
          release_suffix: play30
          play_version: 3.0.2
          scala_version: '3.8'

      - publish_snapshots:
          filters:
            branches:
              only:
                - master
          requires:
            - unit_play26
            - unit_play27
            - unit_play28
            - unit_play29
            - unit_play210
            - unit_play3

      - trigger_dependent_builds:
          filters:
            branches:
              only:
                - master
          requires:
            - publish_snapshots
